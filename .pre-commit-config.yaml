# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix, world-happiness-streamlit]
        files: ^world-happiness-streamlit/

  - repo: local
    hooks:
      - id: pytest-world-happiness
        name: pytest (world-happiness-streamlit)
        language: system
        entry: python -c "import os, subprocess, sys; os.chdir('world-happiness-streamlit'); sys.exit(subprocess.call([sys.executable, '-m', 'pytest', 'tests/', '-q']))"
        pass_filenames: false
        files: ^world-happiness-streamlit/.*\.py$
