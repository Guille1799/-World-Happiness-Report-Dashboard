name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-happiness-streamlit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: world-happiness-streamlit/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Syntax check (main modules)
        run: |
          python -m py_compile app.py insights.py i18n.py trend_helpers.py
