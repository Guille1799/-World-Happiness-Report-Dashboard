# Default theme: light. Users can switch to Dark or System (follow OS) in the app menu
# (⋮ → Settings → Appearance) without editing this file.
#
# For a dark-first deployment, set base = "dark" and consider:
#   primaryColor = "#818cf8"
#   backgroundColor = "#0f172a"
#   secondaryBackgroundColor = "#1e293b"
#   textColor = "#f1f5f9"

[theme]
base = "light"
primaryColor = "#4f46e5"
backgroundColor = "#f4f6fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
